name: Render and Deploy

# Trigger this action every time code is pushed to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository files into the environment
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up your project environment (Example: Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install necessary project dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Execute your specific rendering/building script
      - name: Run render build
        run: npm run build
