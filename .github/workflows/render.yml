name: Deploy static content to Pages

on:
  push:
    branches: ["main", "master"] # Triggers on push to common default branches
  workflow_dispatch: # Allows manual runs from the Actions tab
  schedule:
    - cron: "*/30 * * * *" # Temporary auto-retry while GitHub Actions has outages

permissions:
  contents: read
  pages: write       # Requires permission to write to GitHub Pages
  id-token: write    # Required for secure deployment authentication

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the entire repository root folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
